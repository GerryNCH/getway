<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetWay — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background:
      radial-gradient(at 15% 15%, rgba(250,240,222,0.95) 0px, transparent 55%),
      radial-gradient(at 85% 10%, rgba(222,231,240,0.85) 0px, transparent 55%),
      radial-gradient(at 50% 85%, rgba(241,232,214,0.75) 0px, transparent 55%),
      radial-gradient(at 90% 90%, rgba(216,226,236,0.85) 0px, transparent 55%),
      #fdfbf7;
    background-attachment: fixed;
    color: #111827;
  }
  .font-serif-display { font-family: 'Playfair Display', serif; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  .glass-card {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 20px 50px rgba(0,0,0,0.10);
  }
  .bento-card { background:#fff; box-shadow: 0 2px 14px rgba(20,20,30,0.06); border-radius: 20px; }

  .btn-interactive { transition: all 0.22s ease; }
  .btn-interactive:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .btn-interactive:active { transform: translateY(0) scale(0.97); filter: brightness(0.96); }

  .tab-chip { transition: all 0.25s ease; cursor: pointer; }
  .tab-chip.is-active { background: #8B5CF6; color: #fff; border-color: #8B5CF6; }
  .tab-chip:not(.is-active):hover { border-color: #8B5CF6; background: #F8F6FF; color: #6D28D9; }

  input, select, textarea {
    border: 1px solid #E5E7EB; border-radius: 10px; padding: 8px 12px;
    font-size: 13.5px; width: 100%; background: #fff; outline: none;
    transition: border-color .2s ease;
  }
  input:focus, select:focus, textarea:focus { border-color: #8B5CF6; }
  textarea { resize: vertical; min-height: 52px; }
  label.field-label { font-size: 11px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; display: block; }

  .stop-row { border: 1px solid #EEF0F3; border-radius: 14px; padding: 14px; margin-bottom: 10px; background: #FAFAFB; }
  .day-block { border-left: 3px solid #E9E3FB; padding-left: 16px; margin-bottom: 20px; }

  .pill-btn { border-radius: 999px; font-size: 13px; font-weight: 600; padding: 8px 18px; border: none; cursor: pointer; display:inline-flex; align-items:center; gap:6px; }
  .pill-btn:disabled { opacity: .5; cursor: not-allowed; }
  .pill-purple { background: #8B5CF6; color: #fff; }
  .pill-green  { background: #16A34A; color: #fff; }
  .pill-red    { background: #FEE2E2; color: #B91C1C; }
  .pill-red.solid { background: #DC2626; color: #fff; }
  .pill-gray   { background: #F3F4F6; color: #374151; }

  .icon { width: 15px; height: 15px; stroke-width: 2.1; }

  .upload-zone { cursor: pointer; transition: all .15s ease; }
  .upload-zone:hover { border-color: #8B5CF6 !important; }
  .upload-zone.drag-over { border-color: #8B5CF6 !important; background: #F5F3FF !important; }
  .upload-zone.uploading { opacity: .5; pointer-events: none; }
  .upload-zone.uploading::after {
    content: ""; position: absolute; inset: 0; margin: auto; width: 16px; height: 16px;
    border: 2px solid #8B5CF6; border-top-color: transparent; border-radius: 50%;
    animation: upload-spin .7s linear infinite;
  }
  @keyframes upload-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="antialiased min-h-screen">

<!-- ── LOGIN ─────────────────────────────────────────────────────────── -->
<div id="login-screen" class="min-h-screen flex items-center justify-center px-6">
  <div class="glass-card w-full max-w-sm rounded-[28px] px-8 py-10 text-center">
    <div class="font-serif-display text-2xl mb-1">GetWay<span class="text-[#8B5CF6]">.</span></div>
    <div class="text-[11px] font-semibold tracking-[0.18em] text-[#8B5CF6] uppercase mb-6">Admin Panel</div>
    <div class="flex items-center gap-2.5 h-[48px] px-4 bg-white/80 border border-gray-200 rounded-2xl mb-3">
      <svg class="icon text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input id="login-password" type="password" placeholder="Password" class="flex-1 border-none p-0 text-sm bg-transparent">
    </div>
    <button id="login-btn" class="btn-interactive pill-btn pill-purple w-full justify-center h-[46px]">Sign in</button>
    <p id="login-error" class="text-red-600 text-xs mt-3 hidden">Incorrect password — try again.</p>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────────────── -->
<div id="app-screen" class="hidden">

  <div class="sticky top-0 z-20 bg-[#fdfbf7]/90 backdrop-blur-md border-b border-gray-200/70">
    <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="font-serif-display text-xl">GetWay<span class="text-[#8B5CF6]">.</span> <span class="text-gray-400 text-sm font-sans">Admin</span></div>
      <button id="logout-btn" class="pill-btn pill-gray btn-interactive text-xs">Sign out</button>
    </div>
    <div class="max-w-5xl mx-auto px-6 pb-4 flex gap-2">
      <button class="tab-chip is-active pill-btn pill-gray border border-gray-200" data-tab="pending">Pending review</button>
      <button class="tab-chip pill-btn pill-gray border border-gray-200" data-tab="approved">Published</button>
      <button class="tab-chip pill-btn pill-gray border border-gray-200" data-tab="homepage">Homepage</button>
      <button class="tab-chip pill-btn pill-gray border border-gray-200" data-tab="stats">Statistics</button>
    </div>
  </div>

  <div id="tab-content" class="max-w-5xl mx-auto px-6 py-8"></div>
</div>

<script>
const API_BASE = "https://getway-production.up.railway.app";
const SITE_URL = "https://getway-theta.vercel.app";

async function uploadImageFile(file) {
  const formData = new FormData();
  formData.append("file", file);
  const res = await fetch(`${API_BASE}/admin/upload-image?secret=${encodeURIComponent(SECRET)}`, {
    method: "POST",
    body: formData,
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(text || `Upload failed (${res.status})`);
  }
  const data = await res.json();
  return data.url;
}

// Wires drag-and-drop + click-to-browse onto a preview box, uploading
// whatever image is dropped/picked and calling onUploaded(url) with the
// result. Reused for hero photo, gallery photos, and every stop photo.
function attachUploadZone(zoneEl, onUploaded) {
  zoneEl.classList.add("upload-zone");
  const fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.accept = "image/*";
  fileInput.className = "hidden";
  zoneEl.appendChild(fileInput);

  async function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    zoneEl.classList.add("uploading");
    try {
      const url = await uploadImageFile(file);
      onUploaded(url);
    } catch (e) {
      alert("Upload failed: " + e.message);
    } finally {
      zoneEl.classList.remove("uploading");
    }
  }

  zoneEl.addEventListener("click", (e) => {
    if (e.target !== fileInput) fileInput.click();
  });
  fileInput.addEventListener("change", (e) => handleFile(e.target.files[0]));
  zoneEl.addEventListener("dragover", (e) => { e.preventDefault(); zoneEl.classList.add("drag-over"); });
  zoneEl.addEventListener("dragleave", () => zoneEl.classList.remove("drag-over"));
  zoneEl.addEventListener("drop", (e) => {
    e.preventDefault();
    zoneEl.classList.remove("drag-over");
    handleFile(e.dataTransfer.files[0]);
  });
}
let SECRET = sessionStorage.getItem("getway_admin_secret") || "";
let DATA = {};
let ACTIVE_TAB = "pending";
let SORT_ORDER = "newest";
let SELECTED = new Set();
let DEST_COUNTS = {};
const CATEGORIES = ["hotel", "sight", "food", "activity", "beach", "village"];

// ── Auth ──────────────────────────────────────────────────────────────
let loginInFlight = false;

async function tryLogin(pw) {
  if (loginInFlight) return;
  loginInFlight = true;
  SECRET = pw;

  const btn = document.getElementById("login-btn");
  const originalLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = "Signing in…";
  document.getElementById("login-error").classList.add("hidden");

  try {
    const res = await fetch(`${API_BASE}/admin/stats?secret=${encodeURIComponent(SECRET)}`);
    if (!res.ok) throw new Error("bad secret");
    sessionStorage.setItem("getway_admin_secret", SECRET);
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("app-screen").classList.remove("hidden");
    loadTab("pending");
  } catch (e) {
    document.getElementById("login-error").textContent = "Couldn't sign in — wrong password, or the server is still waking up. Try again in a few seconds.";
    document.getElementById("login-error").classList.remove("hidden");
    btn.disabled = false;
    btn.textContent = originalLabel;
  } finally {
    loginInFlight = false;
  }
}
document.getElementById("login-btn").addEventListener("click", () => tryLogin(document.getElementById("login-password").value.trim()));
document.getElementById("login-password").addEventListener("keydown", (e) => { if (e.key === "Enter") tryLogin(e.target.value.trim()); });
document.getElementById("logout-btn").addEventListener("click", () => { sessionStorage.removeItem("getway_admin_secret"); location.reload(); });
if (SECRET) tryLogin(SECRET);

// ── API helpers ───────────────────────────────────────────────────────
function withSecret(path) {
  const sep = path.includes("?") ? "&" : "?";
  return `${API_BASE}${path}${sep}secret=${encodeURIComponent(SECRET)}`;
}
async function apiGet(path) { const r = await fetch(withSecret(path)); if (!r.ok) throw new Error(await r.text()); return r.json(); }
async function apiPost(path) { const r = await fetch(withSecret(path), { method: "POST" }); if (!r.ok) throw new Error(await r.text()); return r.json(); }
async function apiPut(path, body) {
  const r = await fetch(withSecret(path), { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function apiDelete(path) { const r = await fetch(withSecret(path), { method: "DELETE" }); if (!r.ok) throw new Error(await r.text()); return r.json(); }

// ── Tabs ──────────────────────────────────────────────────────────────
document.querySelectorAll(".tab-chip").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-chip").forEach((b) => b.classList.remove("is-active"));
    btn.classList.add("is-active");
    loadTab(btn.dataset.tab);
  });
});

async function loadTab(tab) {
  ACTIVE_TAB = tab;
  const content = document.getElementById("tab-content");
  content.innerHTML = `<p class="text-gray-400 text-sm">Loading…</p>`;
  try {
    if (tab === "pending" || tab === "approved") {
      const [pendingItems, approvedItems] = await Promise.all([
        apiGet("/admin/pending"),
        apiGet("/admin/approved"),
      ]);
      DEST_COUNTS = {};
      [...pendingItems, ...approvedItems].forEach((it) => {
        const key = (it.destination || "").trim().toLowerCase();
        if (!key) return;
        DEST_COUNTS[key] = (DEST_COUNTS[key] || 0) + 1;
      });
      renderRouteList(tab === "pending" ? pendingItems : approvedItems, tab);
    } else if (tab === "homepage") {
      const [settings, approvedItems] = await Promise.all([
        apiGet("/site-settings"),
        apiGet("/admin/approved"),
      ]);
      renderHomepageTab(settings, approvedItems);
    } else if (tab === "stats") {
      renderStats(await apiGet("/admin/stats"));
    }
  } catch (e) {
    content.innerHTML = `<p class="text-red-600 text-sm">Failed to load: ${escapeHtml(String(e.message || e))}</p>`;
  }
}

function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ── Statistics tab ──────────────────────────────────────────────────
function renderStats(stats) {
  const content = document.getElementById("tab-content");
  const topRows = stats.top_destinations
    .map((d) => `<li class="flex justify-between py-2.5 border-b border-gray-100 text-sm"><span>${escapeHtml(d.destination)}</span><span class="font-semibold">${d.count}</span></li>`)
    .join("");
  const mostViewed = stats.most_viewed
    ? `${escapeHtml(stats.most_viewed.destination)} <span class="text-gray-400 text-sm font-sans">(${stats.most_viewed.views} views)</span>`
    : '<span class="text-gray-400 text-sm font-sans">No views yet</span>';
  const mostClicked = stats.most_clicked
    ? `${escapeHtml(stats.most_clicked.destination)} <span class="text-gray-400 text-sm font-sans">(${stats.most_clicked.clicks} clicks)</span>`
    : '<span class="text-gray-400 text-sm font-sans">No clicks yet</span>';
  content.innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bento-card p-6 text-center"><div class="font-serif-display text-4xl">${stats.total}</div><div class="text-gray-400 text-xs mt-1 uppercase tracking-wide">Total routes</div></div>
      <div class="bento-card p-6 text-center"><div class="font-serif-display text-4xl text-[#B45309]">${stats.pending}</div><div class="text-gray-400 text-xs mt-1 uppercase tracking-wide">Pending</div></div>
      <div class="bento-card p-6 text-center"><div class="font-serif-display text-4xl text-[#16A34A]">${stats.approved}</div><div class="text-gray-400 text-xs mt-1 uppercase tracking-wide">Approved</div></div>
      <div class="bento-card p-6 text-center"><div class="font-serif-display text-4xl text-[#DC2626]">${stats.rejected}</div><div class="text-gray-400 text-xs mt-1 uppercase tracking-wide">Rejected</div></div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bento-card p-5">
        <div class="text-gray-400 text-xs uppercase tracking-wide mb-1.5">Total AI generation cost</div>
        <div class="font-serif-display text-2xl">$${(stats.total_generation_cost_usd || 0).toFixed(3)}</div>
        <div class="text-[11px] text-gray-400 mt-1">Real cost from Anthropic's token usage, not an estimate</div>
      </div>
      <div class="bento-card p-5">
        <div class="text-gray-400 text-xs uppercase tracking-wide mb-1.5">Most viewed route</div>
        <div class="font-serif-display text-lg">${mostViewed}</div>
      </div>
      <div class="bento-card p-5">
        <div class="text-gray-400 text-xs uppercase tracking-wide mb-1.5">Most clicked to book</div>
        <div class="font-serif-display text-lg">${mostClicked}</div>
      </div>
    </div>
    <div class="bento-card p-6 mb-6">
      <div class="flex items-center justify-between mb-2">
        <div class="font-serif-display text-lg">Affiliate link clicks (all routes)</div>
        <div class="font-serif-display text-2xl">${stats.total_affiliate_clicks || 0}</div>
      </div>
      <p class="text-xs text-gray-400 leading-relaxed">This counts clicks on Booking.com / Expedia / Airbnb buttons — not confirmed bookings or commission earned. For actual commission revenue, check the <a href="https://members.cj.com" target="_blank" rel="noopener" class="text-[#8B5CF6] underline">CJ Affiliate dashboard</a> directly — that's where the real booking/payout data lives.</p>
    </div>
    <div class="bento-card p-6">
      <div class="font-serif-display text-lg mb-3">Top destinations</div>
      <ul>${topRows || '<li class="text-gray-400 text-sm">No data yet</li>'}</ul>
    </div>
  `;
}

// ── Pending / Approved list ───────────────────────────────────────────
function renderRouteList(items, listType) {
  const content = document.getElementById("tab-content");
  DATA = {};
  SELECTED = new Set();

  const sorted = [...items].sort((a, b) => {
    const da = new Date(a.created_at || 0).getTime();
    const db = new Date(b.created_at || 0).getTime();
    return SORT_ORDER === "newest" ? db - da : da - db;
  });

  content.innerHTML = "";

  const toolbar = document.createElement("div");
  toolbar.className = "flex items-center justify-between mb-4 flex-wrap gap-3";
  toolbar.innerHTML = `
    <div class="flex items-center gap-3 flex-wrap">
      <label class="flex items-center gap-1.5 text-xs text-gray-500 cursor-pointer whitespace-nowrap">
        <input type="checkbox" id="select-all-checkbox" class="rounded">
        Select all
      </label>
      <div class="flex gap-1">
        <button class="sort-btn pill-btn ${SORT_ORDER === 'newest' ? 'pill-purple' : 'pill-gray'} text-xs" data-sort="newest">Newest first</button>
        <button class="sort-btn pill-btn ${SORT_ORDER === 'oldest' ? 'pill-purple' : 'pill-gray'} text-xs" data-sort="oldest">Oldest first</button>
      </div>
    </div>
    <div class="flex gap-2 bulk-actions"></div>
  `;
  content.appendChild(toolbar);

  const bulkActionsEl = toolbar.querySelector(".bulk-actions");
  if (listType === "pending") {
    bulkActionsEl.appendChild(makePillBtn("Approve selected", "pill-green", () => doBulk(listType, "approve"), checkIconSvg()));
    bulkActionsEl.appendChild(makePillBtn("Reject selected", "pill-red", () => doBulk(listType, "reject"), xIconSvg()));
  } else {
    bulkActionsEl.appendChild(makePillBtn("Hide selected", "pill-gray", () => doBulk(listType, "hide"), eyeOffIconSvg()));
  }

  toolbar.querySelectorAll(".sort-btn").forEach((btn) => {
    btn.addEventListener("click", () => { SORT_ORDER = btn.dataset.sort; renderRouteList(items, listType); });
  });
  toolbar.querySelector("#select-all-checkbox").addEventListener("change", (e) => {
    document.querySelectorAll(".card-select-checkbox").forEach((cb) => {
      cb.checked = e.target.checked;
      cb.dispatchEvent(new Event("change"));
    });
  });

  if (!sorted.length) {
    const empty = document.createElement("div");
    empty.className = "bento-card p-10 text-center text-gray-400 text-sm";
    empty.textContent = "Nothing here yet.";
    content.appendChild(empty);
    return;
  }

  sorted.forEach((item) => {
    DATA[item.video_id] = item;
    content.appendChild(buildCard(item, listType));
  });
}

// ── Homepage tab ──────────────────────────────────────────────────────
function renderHomepageTab(settings, approvedItems) {
  const content = document.getElementById("tab-content");
  content.innerHTML = "";

  const state = {
    heroSlides: [...(settings.hero_slides || [])],
    featuredIds: new Set(settings.featured_route_ids || []),
  };

  // Hero slides editor
  const heroBox = document.createElement("div");
  heroBox.className = "bento-card p-6 mb-5";
  heroBox.innerHTML = `
    <div class="font-serif-display text-lg mb-1">Homepage hero photos</div>
    <p class="text-xs text-gray-400 mb-4">These rotate at the top of the homepage, above the Magic Box. Paste a photo URL and press Add.</p>
    <div class="hero-thumbs flex flex-wrap gap-2 mb-3"></div>
    <div class="flex gap-2">
      <input class="hero-add-input flex-1" placeholder="Paste a photo URL and press Add">
      <button class="pill-btn pill-gray btn-interactive hero-add-btn">${plusIconSvg()}<span>Add</span></button>
    </div>
  `;
  content.appendChild(heroBox);

  const heroThumbs = heroBox.querySelector(".hero-thumbs");
  function renderHeroThumbs() {
    heroThumbs.innerHTML = "";
    state.heroSlides.forEach((url, i) => {
      const cell = document.createElement("div");
      cell.className = "relative";
      cell.innerHTML = `
        <img src="${escapeHtml(url)}" class="w-20 h-14 rounded-lg object-cover bg-gray-100 border border-gray-200" onerror="this.style.opacity=0.15">
        <button type="button" class="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-white shadow flex items-center justify-center text-red-600 remove-hero-btn">${xIconSvg()}</button>
      `;
      cell.querySelector(".remove-hero-btn").addEventListener("click", () => {
        state.heroSlides.splice(i, 1);
        renderHeroThumbs();
      });
      heroThumbs.appendChild(cell);
    });
  }
  renderHeroThumbs();
  heroBox.querySelector(".hero-add-btn").addEventListener("click", () => {
    const input = heroBox.querySelector(".hero-add-input");
    const url = input.value.trim();
    if (!url) return;
    state.heroSlides.push(url);
    input.value = "";
    renderHeroThumbs();
  });

  // Featured routes picker
  const featBox = document.createElement("div");
  featBox.className = "bento-card p-6 mb-5";
  const modeNote = state.featuredIds.size
    ? `Showing only your ${state.featuredIds.size} picked route(s) below, in this order.`
    : `Currently showing ALL approved routes automatically. Check routes below to switch to manual curation.`;
  featBox.innerHTML = `
    <div class="font-serif-display text-lg mb-1">Featured routes on homepage</div>
    <p class="text-xs text-gray-400 mb-4 feat-mode-note">${modeNote}</p>
    <div class="feat-list space-y-2"></div>
    ${approvedItems.length === 0 ? '<p class="text-sm text-gray-400 mt-2">No approved routes yet.</p>' : ''}
  `;
  content.appendChild(featBox);

  const featList = featBox.querySelector(".feat-list");
  const modeNoteEl = featBox.querySelector(".feat-mode-note");
  function refreshModeNote() {
    modeNoteEl.textContent = state.featuredIds.size
      ? `Showing only your ${state.featuredIds.size} picked route(s), in the order checked below.`
      : `Currently showing ALL approved routes automatically. Check routes below to switch to manual curation.`;
  }

  approvedItems.forEach((item) => {
    const row = document.createElement("label");
    row.className = "flex items-center gap-3 p-2.5 rounded-lg hover:bg-gray-50 cursor-pointer";
    row.innerHTML = `
      <input type="checkbox" class="feat-checkbox rounded" ${state.featuredIds.has(item.video_id) ? "checked" : ""}>
      <img src="${escapeHtml(item.hero_photo_url || "")}" class="w-12 h-9 rounded object-cover bg-gray-100 flex-shrink-0" onerror="this.style.opacity=0.15">
      <span class="text-sm">${escapeHtml(item.destination)}</span>
      <span class="text-xs text-gray-400">· ${escapeHtml(item.duration)}</span>
    `;
    row.querySelector(".feat-checkbox").addEventListener("change", (e) => {
      if (e.target.checked) state.featuredIds.add(item.video_id);
      else state.featuredIds.delete(item.video_id);
      refreshModeNote();
    });
    featList.appendChild(row);
  });

  const saveBtn = makePillBtn("Save homepage settings", "pill-purple", async () => {
    saveBtn.disabled = true;
    saveBtn.querySelector("span").textContent = "Saving…";
    try {
      await apiPut("/admin/site-settings", {
        hero_slides: state.heroSlides,
        featured_route_ids: Array.from(state.featuredIds),
      });
      saveBtn.querySelector("span").textContent = "Saved ✓";
      setTimeout(() => { saveBtn.disabled = false; saveBtn.querySelector("span").textContent = "Save homepage settings"; }, 1200);
    } catch (e) {
      alert("Save failed: " + e.message);
      saveBtn.disabled = false;
      saveBtn.querySelector("span").textContent = "Save homepage settings";
    }
  }, saveIconSvg());
  content.appendChild(saveBtn);
}

async function doBulk(listType, action) {
  const ids = Array.from(SELECTED);
  if (!ids.length) { alert("Select at least one route first."); return; }
  const endpointFor = {
    approve: (id) => apiPost(`/admin/approve/${encodeURIComponent(id)}`),
    reject: (id) => apiPost(`/admin/reject/${encodeURIComponent(id)}`),
    hide: (id) => apiPost(`/admin/hide/${encodeURIComponent(id)}`),
  };
  try {
    await Promise.all(ids.map((id) => endpointFor[action](id)));
  } catch (e) {
    alert("Some actions failed: " + e.message);
  }
  loadTab(ACTIVE_TAB);
}

function buildEditorBody(item) {

    <div>
      <label class="field-label">Hero photo URL <span class="text-gray-400 normal-case font-normal">(paste a link, or click/drop an image below)</span></label>
      <div class="flex items-center gap-2">
        <div class="hero-photo-dropzone relative w-11 h-11 rounded-lg bg-gray-100 border border-gray-200 flex-shrink-0 overflow-hidden flex items-center justify-center">

        </div>
        <input class="itin-field flex-1" data-field="hero_photo_url" value="${escapeHtml(item.hero_photo_url || "")}">
      </div>
    </div>
  `;
  topRow.querySelectorAll(".itin-field").forEach((el) => {
    el.addEventListener("input", (e) => {
      DATA[item.video_id][e.target.dataset.field] = e.target.value;
      if (e.target.dataset.field === "hero_photo_url") {
        const img = topRow.querySelector(".hero-photo-preview");
        if (img) { img.classList.add("hidden"); img.src = e.target.value; }
      }
    });
  });
  attachUploadZone(topRow.querySelector(".hero-photo-dropzone"), (url) => {
    item.hero_photo_url = url;
    const input = topRow.querySelector('[data-field="hero_photo_url"]');
    const img = topRow.querySelector(".hero-photo-preview");
    input.value = url;
    img.classList.add("hidden");

  const summaryWrap = document.createElement("div");

  summaryWrap.querySelector(".itin-summary").addEventListener("input", (e) => { item.summary = e.target.value; });
  wrap.appendChild(summaryWrap);

  wrap.appendChild(buildGalleryEditor(item));

  wrap.appendChild(buildHotelBannerEditor(item));

  wrap.appendChild(buildMetaRow(item));

  item.days.forEach((day, dayIdx) => wrap.appendChild(buildDayBlock(item.video_id, dayIdx)));

  const verifyBtn = makePillBtn("Verify locations & photos", "pill-gray verify-locations-btn", () => doVerifyLocations(item.video_id, wrap), searchCheckIconSvg());
  verifyBtn.classList.add("mt-1", "mb-2");
  wrap.appendChild(verifyBtn);

  const saveBtn = makePillBtn("Save changes", "pill-purple", () => doSave(item.video_id, wrap), saveIconSvg());
  saveBtn.classList.add("mt-1");
  wrap.appendChild(saveBtn);

  return wrap;
}

function buildGalleryEditor(item) {
  if (!item.gallery_photo_urls) item.gallery_photo_urls = [];
  const box = document.createElement("div");
  box.className = "mb-5";
  box.innerHTML = `<label class="field-label mb-2">Gallery photos <span class="text-gray-400 normal-case font-normal">(click/drop the + box, or paste a link below)</span></label>`;

  const thumbsRow = document.createElement("div");
  thumbsRow.className = "flex flex-wrap gap-2 mb-2";

  function renderThumbs() {
    thumbsRow.innerHTML = "";
    item.gallery_photo_urls.forEach((url, i) => {
      const cell = document.createElement("div");
      cell.className = "relative";
      cell.innerHTML = `
        <img src="${escapeHtml(url)}" class="w-16 h-16 rounded-lg object-cover bg-gray-100 border border-gray-200" onerror="this.style.opacity=0.15">
        <button type="button" class="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-white shadow flex items-center justify-center text-red-600 remove-gallery-btn">${xIconSvg()}</button>
      `;
      cell.querySelector(".remove-gallery-btn").addEventListener("click", () => {
        item.gallery_photo_urls.splice(i, 1);
        renderThumbs();
      });
      thumbsRow.appendChild(cell);
    });
  }
  renderThumbs();
  box.appendChild(thumbsRow);

  const uploadZone = document.createElement("div");
  uploadZone.className = "gallery-upload-zone w-16 h-16 rounded-lg bg-gray-50 border-2 border-dashed border-gray-200 flex items-center justify-center text-gray-400 mb-3 relative";
  uploadZone.innerHTML = `<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>`;
  box.appendChild(uploadZone);
  attachUploadZone(uploadZone, (url) => {
    item.gallery_photo_urls.push(url);
    renderThumbs();
  });

  const addRow = document.createElement("div");
  addRow.className = "flex gap-2";
  addRow.innerHTML = `<input class="gallery-add-input flex-1" placeholder="Paste a photo URL and press Add">`;
  const addBtn = makePillBtn("Add", "pill-gray", () => {
    const input = addRow.querySelector(".gallery-add-input");
    const url = input.value.trim();
    if (!url) return;
    item.gallery_photo_urls.push(url);
    input.value = "";
    renderThumbs();
  }, plusIconSvg());
  addRow.appendChild(addBtn);
  box.appendChild(addRow);

  return box;
}

function buildMetaRow(item) {
  const box = document.createElement("div");
  box.className = "bg-[#FAF8FF] border border-[#EDE8FC] rounded-2xl p-4 mb-5";
  box.innerHTML = `<div class="field-label mb-2">Homepage curation (shown on the public route grid)</div>`;

  priceSelect.innerHTML = PRICE_OPTIONS.map((p) => `<option value="${p}" ${p === (item.price_category || "€€") ? "selected" : ""}>${p}</option>`).join("");
  priceSelect.addEventListener("change", (e) => { item.price_category = e.target.value; });
  priceWrap.appendChild(priceSelect);
  grid.appendChild(priceWrap);

  const handleWrap = document.createElement("div");
  handleWrap.innerHTML = `<label class="field-label">Creator handle</label>`;

  handleInput.placeholder = "@username";
  handleInput.value = item.creator_handle || "";

  handleWrap.appendChild(handleInput);
  grid.appendChild(handleWrap);

  box.appendChild(grid);

  const tagsWrap = document.createElement("div");
  tagsWrap.innerHTML = `<label class="field-label mb-2">Tags (filter chips)</label>`;
  const tagsRow = document.createElement("div");
  tagsRow.className = "flex flex-wrap gap-2";
  const currentTags = new Set(item.tags || []);
  TAG_OPTIONS.forEach((tag) => {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.textContent = tag.replace(/_/g, " ");
    chip.className = "tag-chip text-xs px-3 py-1.5 rounded-full border " + (currentTags.has(tag) ? "border-[#8B5CF6] bg-[#F1EEFF] text-[#6D28D9]" : "border-gray-200 bg-white text-gray-600");
    chip.addEventListener("click", () => {
      if (currentTags.has(tag)) {
        currentTags.delete(tag);
        chip.className = "tag-chip text-xs px-3 py-1.5 rounded-full border border-gray-200 bg-white text-gray-600";
      } else {
        currentTags.add(tag);
        chip.className = "tag-chip text-xs px-3 py-1.5 rounded-full border border-[#8B5CF6] bg-[#F1EEFF] text-[#6D28D9]";

  box.appendChild(tagsWrap);

  return box;
}

async function doVerifyLocations(videoId, wrap) {
  const btnEl = wrap.querySelector(".verify-locations-btn");
  const btn = btnEl.querySelector("span");
  const originalLabel = btn.textContent;
  btnEl.disabled = true;
  btn.textContent = "Verifying… (this can take a moment for big routes)";

  // Clear any previous verification banners before re-checking
  wrap.querySelectorAll(".location-unconfirmed-banner").forEach((el) => el.remove());

  try {
    const data = await apiPost(`/admin/verify-locations/${encodeURIComponent(videoId)}`);
    let unconfirmedCount = 0;
    (data.results || []).forEach((r) => {
      if (r.confirmed) return;
      unconfirmedCount++;
      const row = wrap.querySelector(`.day-block[data-day="${r.day}"] .stop-row[data-stop="${r.stop_index}"]`);
      if (!row) return;
      const banner = document.createElement("div");
      banner.className = "location-unconfirmed-banner text-[11px] text-amber-700 bg-amber-50 rounded-lg px-3 py-2 mb-3 flex items-center gap-1.5";
      banner.innerHTML = `<i data-lucide="alert-triangle" class="w-3.5 h-3.5 flex-shrink-0"></i><span>Couldn't confirm this location on Google — double-check the name, add a Maps link override below, and check the photo.</span>`;
      row.insertBefore(banner, row.firstChild);
    });
    if (typeof lucide !== "undefined") lucide.createIcons();
    btn.textContent = unconfirmedCount
      ? `${unconfirmedCount} location(s) need a look — see flagged stops below`
      : "All locations confirmed ✓";
  } catch (e) {
    alert("Verification failed: " + e.message);
    btn.textContent = originalLabel;
  } finally {
    btnEl.disabled = false;
  }
}

async function doSave(videoId, editorWrap) {
  const btn = editorWrap.querySelector(".pill-purple");
  btn.disabled = true;
  btn.querySelector("span").textContent = "Saving…";
  try {
    const item = DATA[videoId];
    await apiPut(`/admin/route/${encodeURIComponent(videoId)}`, {
      destination: item.destination,
      duration: item.duration,
      days: item.days,
      summary: item.summary || "",
      hero_photo_url: item.hero_photo_url,
      gallery_photo_urls: item.gallery_photo_urls || [],
      hotel_banner_photo_url: item.hotel_banner_photo_url || "",
    });
    await apiPut(`/admin/meta/${encodeURIComponent(videoId)}`, {
      price_category: item.price_category || "€€",
      tags: item.tags || [],
      creator_handle: item.creator_handle || "",
    });
    btn.querySelector("span").textContent = "Saved ✓";
    setTimeout(() => loadTab(ACTIVE_TAB), 600);
  } catch (e) {
    alert("Save failed: " + e.message);
    btn.disabled = false;
    btn.querySelector("span").textContent = "Save changes";
  }
}
async function doApprove(videoId) { try { await apiPost(`/admin/approve/${encodeURIComponent(videoId)}`); loadTab(ACTIVE_TAB); } catch (e) { alert("Error: " + e.message); } }
async function doReject(videoId) { if (!confirm("Reject this route?")) return; try { await apiPost(`/admin/reject/${encodeURIComponent(videoId)}`); loadTab(ACTIVE_TAB); } catch (e) { alert("Error: " + e.message); } }
async function doHide(videoId) { try { await apiPost(`/admin/hide/${encodeURIComponent(videoId)}`); loadTab(ACTIVE_TAB); } catch (e) { alert("Error: " + e.message); } }
async function doClearCache(videoId) {
  if (!confirm("This permanently deletes this route from the cache. You'll be able to paste the same TikTok link into Magic Box again and get a fresh AI-generated version. Continue?")) return;
  try { await apiDelete(`/admin/route/${encodeURIComponent(videoId)}`); loadTab(ACTIVE_TAB); }
  catch (e) { alert("Error: " + e.message); }
}
</script>
